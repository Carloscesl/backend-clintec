version: "3.9"

services:

  backend-clintec:
    build: .
    image: backend-clintec:1.0
    container_name: backend-clintec-container
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      db-clintec:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - clintec-net

  db-clintec:
    image: mysql:8.0
    container_name: mysql-clintec
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: clintec_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - clintec-net
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:

networks:
  clintec-net:
    driver: bridge
