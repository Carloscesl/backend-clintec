# Swagger habilitado
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Logging
# Nivel base solo errores graves de librerías externas
logging.level.root=WARN

# Tu código INFO para ver tus logs de negocio
logging.level.com.terreneitors.backendclintec=INFO

# Hibernate solo en desarrollo
logging.level.org.hibernate.SQL=DEBUG

# muestra los valores de los ?
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Spring Security útil para debug de autenticación
logging.level.org.springframework.security=WARN

# Spring Web para ver qué rutas se registran al arrancar
logging.level.org.springframework.web=WARN

#  Consola
spring.output.ansi.enabled=ALWAYS
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%-5level) %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} : %msg%n
